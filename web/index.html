<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Tunnel Platform - 仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" x-data="tunnelApp()">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold">SSH Tunnel Platform</span>
                </div>
                <div class="flex items-center space-x-4">
                    <template x-if="!isLoggedIn">
                        <button @click="showLogin = true" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-2 rounded-md text-sm font-medium">登录</button>
                    </template>
                    <template x-if="isLoggedIn">
                        <div class="flex items-center space-x-4">
                            <span x-text="currentUser" class="text-sm"></span>
                            <button @click="setupMfa" class="text-xs bg-indigo-700 hover:bg-indigo-800 px-2 py-1 rounded">启用 MFA</button>
                            <button @click="logout" class="bg-indigo-500 hover:bg-indigo-400 px-3 py-2 rounded-md text-sm font-medium">退出</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <!-- Login Modal -->
        <div x-show="showLogin" class="fixed z-10 inset-0 overflow-y-auto" x-cloak>
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                    <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
                </div>
                <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900">登录</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">用户名</label>
                                <input type="text" x-model="loginForm.username" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">密码</label>
                                <input type="password" x-model="loginForm.password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div x-show="mfaRequired">
                                <label class="block text-sm font-medium text-gray-700 text-indigo-600">MFA 验证码</label>
                                <input type="text" x-model="loginForm.mfa_code" placeholder="6位数字" class="mt-1 block w-full border-2 border-indigo-300 rounded-md shadow-sm p-2">
                                <p class="text-xs text-gray-500 mt-1">该账户已启用双重认证，请输入验证码。</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                        <button @click="login" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 sm:ml-3 sm:w-auto sm:text-sm">登录</button>
                        <button @click="showLogin = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MFA Setup Modal -->
        <div x-show="showMfaSetup" class="fixed z-10 inset-0 overflow-y-auto" x-cloak>
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                    <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
                </div>
                <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900">配置多因素认证 (MFA)</h3>
                        <div class="mt-4 text-center">
                            <p class="text-sm text-gray-500 mb-4">请使用 Google Authenticator 或 Microsoft Authenticator 扫描下方二维码</p>
                            <div class="flex justify-center mb-4">
                                <img :src="mfaData.qr_code" alt="MFA QR Code" class="border p-2 bg-white">
                            </div>
                            <div class="bg-gray-100 p-3 rounded text-sm break-all mb-4">
                                <p class="font-bold text-gray-700">手动输入密钥:</p>
                                <code x-text="mfaData.secret" class="text-indigo-600"></code>
                            </div>
                            <div class="mt-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">输入验证码以验证</label>
                                <input type="text" x-model="mfaVerifyCode" placeholder="6位数字" class="block w-full border border-gray-300 rounded-md shadow-sm p-2 text-center text-lg tracking-widest">
                            </div>
                            <p class="mt-4 text-xs text-red-500 font-bold">请务必保存好您的密钥，丢失将无法找回！</p>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                        <button @click="verifyMfaSetup" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 sm:ml-3 sm:w-auto sm:text-sm">验证并启用</button>
                        <button @click="showMfaSetup = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Tunnel Modal -->
        <div x-show="showEditTunnelModal" class="fixed z-10 inset-0 overflow-y-auto" x-cloak>
            <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                    <div class="absolute inset-0 bg-gray-500 opacity-75"></div>
                </div>
                <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900">编辑隧道</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">隧道 ID</label>
                                <input type="text" x-model="editingTunnel.id" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 bg-gray-100" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 主机</label>
                                <input type="text" x-model="editingTunnel.ssh_host" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 端口</label>
                                <input type="number" x-model="editingTunnel.ssh_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 用户名</label>
                                <input type="text" x-model="editingTunnel.username" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 密码</label>
                                <input type="password" x-model="editingTunnel.password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">类型</label>
                                <input type="text" x-model="editingTunnel.type" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 bg-gray-100" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">本地监听端口</label>
                                <input type="number" x-model="editingTunnel.local_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 bg-gray-100" readonly>
                            </div>
                            <template x-if="editingTunnel.type === 'local'">
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">远程主机</label>
                                        <input type="text" x-model="editingTunnel.remote_host" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700">远程端口</label>
                                        <input type="number" x-model="editingTunnel.remote_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                    </div>
                                </div>
                            </template>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">备注</label>
                                <input type="text" x-model="editingTunnel.remark" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                        <button @click="saveEditedTunnel" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 sm:ml-3 sm:w-auto sm:text-sm">保存</button>
                        <button @click="showEditTunnelModal = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div x-show="isLoggedIn" x-cloak>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Create Tunnel -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-800">新建隧道</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">类型</label>
                            <select x-model="tunnelForm.type" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                <option value="local">本地端口转发 (Local)</option>
                                <option value="socks5">动态 SOCKS5 代理</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 主机</label>
                                <input type="text" x-model="tunnelForm.ssh_host" placeholder="127.0.0.1" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 端口</label>
                                <input type="number" x-model="tunnelForm.ssh_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 用户名</label>
                                <input type="text" x-model="tunnelForm.username" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">SSH 密码</label>
                                <input type="password" x-model="tunnelForm.password" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">本地监听端口</label>
                            <input type="number" x-model="tunnelForm.local_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">备注</label>
                            <input type="text" x-model="tunnelForm.remark" placeholder="例如: 服务器1, 我的测试服务器" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                        </div>
                        <template x-if="tunnelForm.type === 'local'">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">远程主机</label>
                                    <input type="text" x-model="tunnelForm.remote_host" placeholder="127.0.0.1" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700">远程端口</label>
                                    <input type="number" x-model="tunnelForm.remote_port" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                                </div>
                            </div>
                        </template>
                        <button @click="createTunnel" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition duration-150">创建隧道</button>
                    </div>
                </div>

                <!-- Active Tunnels -->
                <div class="bg-white shadow rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">活动隧道</h2>
                        <button @click="fetchTunnels" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">刷新</button>
                    </div>
                    <div class="overflow-hidden">
                        <ul class="divide-y divide-gray-200">
                            <template x-for="tunnel in tunnels" :key="tunnel.id">
                                <li class="py-4 flex justify-between items-center">
                                    <div class="flex items-center">
                                        <div class="h-8 w-8 rounded-full flex items-center justify-center"
                                             :class="tunnel.verified === 'loading' ? 'bg-yellow-100' : (tunnel.verified === false ? 'bg-red-100' : 'bg-green-100')">
                                            <svg class="h-5 w-5" :class="tunnel.verified === 'loading' ? 'text-yellow-500 animate-pulse' : (tunnel.verified === false ? 'text-red-600' : 'text-green-600')" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                            </svg>
                                        </div>
                                        <div class="ml-3">
                                             <p class="text-sm font-medium text-gray-900" x-text="tunnel.remark || (tunnel.id.substring(0,8) + '...')"></p>
                                             <p class="text-xs text-gray-500" x-text="'Port: ' + tunnel.local_port + ' (' + tunnel.type + ')'"></p>
                                         </div>
                                    </div>
                                    <div class="flex space-x-2">
                                        <button @click="verifyTunnel(tunnel)" class="text-green-600 hover:text-green-800 text-sm font-medium">验证</button>
                                        <button @click="openEditTunnelModal(tunnel)" class="text-blue-600 hover:text-blue-800 text-sm font-medium">修改</button>
                                        <a :href="'/terminal.html?tid=' + tunnel.id" target="_blank" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">终端</a>
                                        <button @click="stopTunnel(tunnel.id)" class="text-red-600 hover:text-red-800 text-sm font-medium">停止</button>
                                    </div>
                                </li>
                            </template>
                            <template x-if="tunnels.length === 0">
                                <li class="py-4 text-center text-gray-500 text-sm">暂无活动隧道</li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Audit Logs (Admin) -->
            <div class="mt-8 bg-white shadow rounded-lg p-6" x-show="currentUser === 'admin'">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-gray-800">审计日志</h2>
                    <button @click="fetchLogs" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">刷新</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用户</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">详情</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            <template x-for="log in logs" :key="log.id">
                                <tr>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.timestamp"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="log.user"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="log.action"></td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" 
                                              :class="log.status === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                              x-text="log.status"></span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-500" x-text="log.details"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div x-show="!isLoggedIn" class="text-center py-20" x-cloak>
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4">欢迎使用 SSH 隧道管理平台</h1>
            <p class="text-xl text-gray-600 mb-8">安全、高效、可扩展的 SSH 隧道解决方案</p>
            <button @click="showLogin = true" class="bg-indigo-600 text-white px-8 py-3 rounded-md font-bold text-lg hover:bg-indigo-700">立即开始</button>
        </div>
    </main>

    <script>
        function tunnelApp() {
            return {
                isLoggedIn: false,
                showLogin: false,
                mfaRequired: false,
                showMfaSetup: false,
                mfaData: { secret: '', qr_code: '' },
                mfaVerifyCode: '',
                currentUser: '',
                tunnels: [],
                logs: [],
                showEditTunnelModal: false,
                editingTunnel: {
                    id: '',
                    ssh_host: '',
                    ssh_port: 22,
                    username: '',
                    password: '',
                    local_port: 0,
                    remote_host: '',
                    remote_port: 0,
                    type: '',
                    remark: ''
                },
                loginForm: {
                    username: '',
                    password: '',
                    mfa_code: ''
                },
                tunnelForm: {
                    type: 'local',
                    ssh_host: '127.0.0.1',
                    ssh_port: 22,
                    username: 'user',
                    password: 'password',
                    local_port: 8080,
                    remote_host: '127.0.0.1',
                    remote_port: 80,
                    remark: ''
                },
                API_BASE: '', // Current origin

                async init() {
                    const token = localStorage.getItem('token');
                    if (token) {
                        this.isLoggedIn = true;
                        this.currentUser = localStorage.getItem('username');
                        this.fetchTunnels();
                        if (this.currentUser === 'admin') {
                            this.fetchLogs();
                        }
                    }
                },

                async login() {
                    try {
                        const response = await fetch(`${this.API_BASE}/auth/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });
                        const data = await response.json();
                        if (response.ok) {
                            this.isLoggedIn = true;
                            this.currentUser = this.loginForm.username;
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('username', this.currentUser);
                            this.showLogin = false;
                            this.mfaRequired = false;
                            this.fetchTunnels();
                            if (this.currentUser === 'admin') {
                                this.fetchLogs();
                            }
                        } else if (data.detail === 'MFA_REQUIRED') {
                            this.mfaRequired = true;
                        } else {
                            alert(data.detail || '登录失败');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                },

                async setupMfa() {
                    try {
                        const response = await fetch(`${this.API_BASE}/auth/mfa/setup?username=${this.currentUser}`, {
                            method: 'POST'
                        });
                        const data = await response.json();
                        if (response.ok) {
                            this.mfaData = data;
                            this.showMfaSetup = true;
                        } else {
                            alert(data.detail || '设置失败');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                },

                async verifyMfaSetup() {
                    try {
                        const response = await fetch(`${this.API_BASE}/auth/mfa/verify`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.currentUser,
                                code: this.mfaVerifyCode
                            })
                        });
                        const data = await response.json();
                        if (response.ok) {
                            alert('MFA 验证成功并已启用！');
                            this.showMfaSetup = false;
                            this.mfaVerifyCode = '';
                        } else {
                            alert(data.detail || '验证失败，请检查验证码');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                },

                logout() {
                    this.isLoggedIn = false;
                    this.currentUser = '';
                    localStorage.removeItem('token');
                    localStorage.removeItem('username');
                },

                async fetchTunnels() {
                    try {
                        const response = await fetch(`${this.API_BASE}/tunnel/list`);
                        const data = await response.json();
                        this.tunnels = data.tunnels.map(t => {
                            const existing = this.tunnels.find(et => et.id === t.id);
                            return existing ? { ...t, verified: existing.verified } : { ...t, verified: true };
                        });
                    } catch (e) {
                        console.error(e);
                    }
                },

                async verifyTunnel(tunnel) {
                    try {
                        const index = this.tunnels.findIndex(t => t.id === tunnel.id);
                        if (index !== -1) {
                            this.tunnels[index].verified = 'loading';
                        }

                        const response = await fetch(`${this.API_BASE}/tunnel/verify/${tunnel.id}?local_port=${tunnel.local_port}`, {
                            method: 'POST',
                            headers: { 'X-User': this.currentUser }
                        });
                        const data = await response.json();
                        
                        if (index !== -1) {
                            this.tunnels[index].verified = data.success;
                        }
                    } catch (e) {
                        console.error(e);
                        const index = this.tunnels.findIndex(t => t.id === tunnel.id);
                        if (index !== -1) {
                            this.tunnels[index].verified = false;
                        }
                    }
                },

                async createTunnel() {
                    try {
                        // 如果没有提供备注，则自动生成一个
                        if (!this.tunnelForm.remark) {
                            let nextServerNum = this.tunnels.filter(t => t.remark && t.remark.startsWith('服务器')).length + 1;
                            this.tunnelForm.remark = `服务器${nextServerNum}`;
                        }

                        const response = await fetch(`${this.API_BASE}/tunnel/create`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'X-User': this.currentUser
                            },
                            body: JSON.stringify(this.tunnelForm)
                        });
                        const data = await response.json();
                        if (response.ok) {
                            this.fetchTunnels();
                            alert('隧道创建成功: ' + data.tunnel_id);
                            // 重置备注字段，以便下次创建时可以重新生成或手动输入
                            this.tunnelForm.remark = '';
                        } else {
                            alert(data.detail || '创建失败');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                },

                async stopTunnel(tunnelId) {
                    try {
                        const response = await fetch(`${this.API_BASE}/tunnel/stop/${tunnelId}`, {
                            method: 'POST',
                            headers: { 'X-User': this.currentUser }
                        });
                        if (response.ok) {
                            this.fetchTunnels();
                        } else {
                            const data = await response.json();
                            alert(data.detail || '停止失败');
                        }
                    } catch (e) {
                        console.error(e);
                    }
                },

                async saveEditedTunnel() {
                    try {
                        const response = await fetch(`${this.API_BASE}/tunnel/update/${this.editingTunnel.id}`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'X-User': this.currentUser
                            },
                            body: JSON.stringify({
                                remark: this.editingTunnel.remark,
                                ssh_host: this.editingTunnel.ssh_host,
                                ssh_port: this.editingTunnel.ssh_port,
                                username: this.editingTunnel.username,
                                password: this.editingTunnel.password,
                                local_port: this.editingTunnel.local_port,
                                remote_host: this.editingTunnel.remote_host,
                                remote_port: this.editingTunnel.remote_port,
                                type: this.editingTunnel.type
                            })
                        });
                        if (response.ok) {
                            alert('隧道更新成功！');
                            this.fetchTunnels();
                            this.showEditTunnelModal = false;
                        } else {
                            const data = await response.json();
                            alert(data.detail || '更新失败');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                },

                openEditTunnelModal(tunnel) {
                    this.editingTunnel = { ...tunnel };
                    this.showEditTunnelModal = true;
                },

                async fetchLogs() {
                    try {
                        const response = await fetch(`${this.API_BASE}/auth/logs`, {
                            headers: { 
                                'X-User': this.currentUser
                            }
                        });
                        const data = await response.json();
                        if (response.ok) {
                            this.logs = data.logs.map(log => ({
                                ...log,
                                timestamp: new Date(log.timestamp).toLocaleString()
                            }));
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }
            }
        }
    </script>
</body>
</html>
